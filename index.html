<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏夜晚风 - Summer Night</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <!-- Panel toggle button -->
    <button id="panel-toggle" aria-label="菜单">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <!-- Overlay backdrop -->
    <div id="panel-overlay"></div>

    <!-- Left Panel: Animal List & Controls -->
    <div id="left-panel">
        <div id="panel-scroll">
            <h1 id="title">夏夜晚风</h1>
            <p id="subtitle">拖拽或双击动物来构建你的夏夜</p>

            <div id="animal-list">
                <!-- Generated by JS -->
            </div>

            <div id="bgm-section">
                <h3>背景音乐</h3>
                <div id="bgm-options">
                    <label class="bgm-option">
                        <input type="radio" name="bgm" value="rainy">
                        <span>雨天</span>
                    </label>
                    <label class="bgm-option">
                        <input type="radio" name="bgm" value="windy">
                        <span>大风天</span>
                    </label>
                    <label class="bgm-option">
                        <input type="radio" name="bgm" value="none" checked>
                        <span>无</span>
                    </label>
                </div>
            </div>

            <div id="volume-section">
                <h3>总音量</h3>
                <input type="range" id="master-volume" min="0" max="100" value="70">
                <span id="volume-label">70%</span>
            </div>

            <div id="bgm-volume-section">
                <h3>环境音音量</h3>
                <input type="range" id="bgm-volume" min="0" max="100" value="60">
                <span id="bgm-volume-label">60%</span>
            </div>
        </div>
    </div>

    <!-- Right Panel: Map -->
    <div id="right-panel">
        <div id="map-container">
            <img src="background_images/background.png" class="bg-layer" style="z-index: 1;" alt="background" draggable="false">
            <img src="background_images/farmland.png" class="bg-layer" style="z-index: 2;" alt="farmland" draggable="false">
            <img src="background_images/grass.png" class="bg-layer" style="z-index: 3;" alt="grass" draggable="false">
            <img src="background_images/lotus.png" class="bg-layer" style="z-index: 4;" alt="lotus" draggable="false">
            <img src="background_images/forest.png" class="bg-layer" style="z-index: 5;" alt="forest" draggable="false">
            <div id="placed-animals-layer" style="z-index: 10;"></div>
        </div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
